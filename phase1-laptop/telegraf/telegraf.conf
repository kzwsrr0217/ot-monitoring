[global_tags]
  site        = "${SITE_NAME}"
  environment = "${ENVIRONMENT}"

[agent]
  interval         = "1s"
  flush_interval   = "10s"
  flush_jitter     = "1s"
  hostname         = "collector-vm-poc"
  omit_hostname    = false

# INPUT: PLC Simulator (Prometheus format)
# In production, replace with [[inputs.ads]] blocks for each Beckhoff TwinCAT PLC.
[[inputs.prometheus]]
  urls           = ["http://simulator:8000/metrics"]
  metric_version = 2

# OUTPUT 1: Prometheus /metrics endpoint (scraped by Prometheus)
[[outputs.prometheus_client]]
  listen             = ":9273"
  metric_version     = 2
  expiration_interval = "60s"

# OUTPUT 2: SQL Server — uncomment and configure .env after creating the DB schema
# [[outputs.sqlserver]]
#   driver            = "mssql"
#   connection_string = "Server=${SQL_SERVER};Port=${SQL_PORT};Database=${SQL_DB};User Id=${SQL_USER};Password=${SQL_PASSWORD};"
#   health_metric     = true

# OUTPUT 3: stdout debug (comment out in production)
[[outputs.file]]
  files        = ["stdout"]
  data_format  = "influx"
  rotation_max_size = "10MB"
