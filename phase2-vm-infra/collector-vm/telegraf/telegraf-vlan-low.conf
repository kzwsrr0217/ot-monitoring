# Additional Telegraf config for machines on OT VLAN "low" segment.
# Drop this file alongside telegraf.conf — Telegraf merges all .conf files in the same directory.
#
# Usage: set TELEGRAF_CONFIG_DIR=/opt/ot-monitoring/telegraf in the systemd unit
# and Telegraf will auto-load both files.

# INPUT: line3 PLC — VLAN low, separate subnet
# [[inputs.ads]]
#   endpoint = "192.168.10.103:48898"
#   tags = {machine_id="line3", vlan="low"}

# If still in PoC/simulator mode use prometheus input:
[[inputs.prometheus]]
  urls           = ["http://${SIMULATOR_HOST_LOW:-simulator-vm}:8001/metrics"]
  metric_version = 2
  [inputs.prometheus.tags]
    machine_source = "line3"
