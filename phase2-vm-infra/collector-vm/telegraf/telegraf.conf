[global_tags]
  site        = "${SITE_NAME}"
  environment = "${ENVIRONMENT}"

[agent]
  interval         = "1s"
  flush_interval   = "10s"
  flush_jitter     = "1s"
  hostname         = "${COLLECTOR_HOSTNAME:-collector-vm-01}"
  omit_hostname    = false

# INPUT: line1 PLC / Simulator — VLAN low
# In production replace this block with:
#   [[inputs.ads]]
#     endpoint = "192.168.10.101:48898"  # PLC IP on OT VLAN
#     tags = {machine_id="line1", vlan="low"}
[[inputs.prometheus]]
  urls         = ["http://${SIMULATOR_HOST:-simulator-vm}:8000/metrics"]
  metric_version = 2
  [inputs.prometheus.tags]
    machine_source = "line1"

# INPUT: line2 PLC / Simulator — VLAN medium (separate config file for multi-VLAN)
# Include telegraf-vlan-low.conf for additional PLCs on different VLANs

# OUTPUT 1: Prometheus /metrics (scraped by monitoring-vm Prometheus)
[[outputs.prometheus_client]]
  listen             = ":9273"
  metric_version     = 2
  expiration_interval = "60s"

# OUTPUT 2: SQL Server (on-prem sql-vm)
[[outputs.sqlserver]]
  driver            = "mssql"
  connection_string = "Server=${SQL_SERVER};Port=${SQL_PORT:-1433};Database=${SQL_DB:-OTMonitoring};User Id=${SQL_USER};Password=${SQL_PASSWORD};"
  health_metric     = true
