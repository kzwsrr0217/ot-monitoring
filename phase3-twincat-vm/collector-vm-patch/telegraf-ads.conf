# ============================================================
# Telegraf konfig — Phase 3: ADS input
# Collector VM: /opt/ot-monitoring/telegraf/telegraf.conf
#
# VALTOZAS a phase2-hoz kepest:
#   - [[inputs.prometheus]] ELTAVOLITVA (Python szimulator)
#   + [[inputs.ads]]        HOZZAADVA   (TwinCAT VM)
#
# Minden output blokk azonos maradt --- SQL es Prometheus
# ============================================================

[global_tags]
  site        = "${SITE_NAME}"
  environment = "${ENVIRONMENT}"

[agent]
  interval          = "1s"
  flush_interval    = "10s"
  flush_jitter      = "1s"
  hostname          = "collector-vm"
  omit_hostname     = false

# ============================================================
# INPUT: TwinCAT ADS
# Phase 2-ben ez [[inputs.prometheus]] volt
# ============================================================
[[inputs.ads]]
  target_ip         = "${TWINCAT_VM_IP}"
  target_port       = 48898
  target_ams_net_id = "${TWINCAT_AMS_NET_ID}"
  target_ams_port   = 851
  route_ams_net_id  = "${COLLECTOR_AMS_NET_ID}"
  measurement       = "machine_telemetry"

  [inputs.ads.tags]
    machine_id = "${MACHINE_ID}"
    vlan       = "${MACHINE_VLAN}"
    site       = "${SITE_NAME}"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.xMachineON"
    field     = "machine_on"
    data_type = "BOOL"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.xProductionRun"
    field     = "production_run"
    data_type = "BOOL"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.xMachineErrorState"
    field     = "machine_error_state"
    data_type = "BOOL"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.nOK_Counter"
    field     = "ok_count"
    data_type = "DINT"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.nNOK_Counter"
    field     = "nok_count"
    data_type = "DINT"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.nCycleCount"
    field     = "cycle_count"
    data_type = "UDINT"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.nProdType"
    field     = "prod_type"
    data_type = "INT"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.nLastCycleTimeMs"
    field     = "cycle_time_ms"
    data_type = "UDINT"

  [[inputs.ads.symbol]]
    name      = "GVL_Monitoring.nLastStoppageTimeMs"
    field     = "stoppage_ms"
    data_type = "UDINT"

# ============================================================
# OUTPUT 1: Prometheus client
# VALTOZATLAN a phase2-hoz kepest
# ============================================================
[[outputs.prometheus_client]]
  listen              = ":9273"
  metric_version      = 2
  expiration_interval = "60s"

# ============================================================
# OUTPUT 2: SQL Server
# VALTOZATLAN a phase2-hoz kepest
# Javitas: [[outputs.sqlserver]] nem letezik Telegrafban ---
#          a helyes plugin neve [[outputs.sql]]
# ============================================================
[[outputs.sql]]
  driver           = "mssql"
  data_source_name = "Server=${SQL_SERVER};Port=${SQL_PORT};Database=${SQL_DB};User Id=${SQL_USER};Password=${SQL_PASSWORD};encrypt=disable"

# ============================================================
# OUTPUT 3: stdout debug
# VALTOZATLAN a phase2-hoz kepest
# ============================================================
[[outputs.file]]
  files       = ["stdout"]
  data_format = "influx"
